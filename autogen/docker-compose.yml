services:
  # ── App (Gradio + AutoGen pipeline) ───────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    env_file:
      - .env
    environment:
      # Override to use internal Docker network hostname
      LANGFUSE_BASE_URL: http://langfuse:3000
    # depends_on:
    #   langfuse:
    #     condition: service_healthy
    restart: unless-stopped
    volumes:
      # Hot-reload app code during development without rebuild
      - ./app:/app/app:ro

